name: Build and push Conduit frontend

on: 
  push:
    branches:
      - main
      
jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with: 
          registry: ghcr.io
          username: ${{ vars.GH_USERNAME }}
          password: ${{ secrets.GH_PAT }}   
      
      - name: Build and push to GHCR
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ vars.GH_USERNAME }}/${{ vars.FRONTEND_REPO_NAME }}:${{ github.sha }}
        
  call-deploy-workflow:
    needs: build
    uses: vbortnyk/conduit-practice/.github/workflows/deployment-submodules.yml@main
    secrets: inherit
    with:
      service: ${{ vars.FRONTEND_SERVICE_NAME }}
      tag: ${{ github.sha }}
